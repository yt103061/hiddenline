<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>アニマルライン / HIDDEN LINE</title>
    <link rel="icon" href="assets/app_icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body data-screen="home">
    <section id="screen-home" class="screen">
      <img class="home-logo" src="assets/logo.svg" alt="HIDDEN LINE" />
      <p class="tagline">正体をかくした動物たちの、推理と駆け引きのボードゲーム</p>

      <form id="setup">
        <fieldset class="option-group">
          <legend>対戦相手</legend>
          <div class="option-cards">
            <label class="option-card">
              <input type="radio" name="opponent" value="ai" checked />
              <span class="option-title">🤖 AIと対戦</span>
              <span class="option-desc">ひとりで遊ぶ。AIの強さを選べます。</span>
            </label>
            <label class="option-card">
              <input type="radio" name="opponent" value="human" />
              <span class="option-title">👥 2人で対戦</span>
              <span class="option-desc">ひとつの端末を交代で使って対戦します。</span>
            </label>
          </div>
        </fieldset>

        <fieldset class="option-group">
          <legend>ルール</legend>
          <div class="option-cards">
            <label class="option-card">
              <input type="radio" name="mode" value="casual" checked />
              <span class="option-title">🌱 カジュアル</span>
              <span class="option-desc">6×6の盤・各10駒。まずはここから。約5分。</span>
            </label>
            <label class="option-card">
              <input type="radio" name="mode" value="classic" />
              <span class="option-title">🌳 クラシック</span>
              <span class="option-desc">6×8の盤・各23駒。全部の動物が登場。約15分。</span>
            </label>
          </div>
        </fieldset>

        <fieldset class="option-group">
          <legend>はじめの並べ方</legend>
          <div class="option-cards">
            <label class="option-card">
              <input type="radio" name="preset" value="balanced" checked />
              <span class="option-title">⚖️ バランス型</span>
              <span class="option-desc">攻めと守りをほどよく配置。</span>
            </label>
            <label class="option-card">
              <input type="radio" name="preset" value="attack" />
              <span class="option-title">⚔️ 攻撃型</span>
              <span class="option-desc">強い駒を前へ。先手先手で押し込む。</span>
            </label>
            <label class="option-card">
              <input type="radio" name="preset" value="defense" />
              <span class="option-title">🛡️ 守備型</span>
              <span class="option-desc">強い駒を後ろへ。じっくり構える。</span>
            </label>
          </div>
        </fieldset>

        <fieldset class="option-group" id="group-difficulty">
          <legend>AIの強さ</legend>
          <div class="option-cards">
            <label class="option-card">
              <input type="radio" name="difficulty" value="beginner" />
              <span class="option-title">🐣 初級</span>
              <span class="option-desc">はじめての人向け。</span>
            </label>
            <label class="option-card">
              <input type="radio" name="difficulty" value="intermediate" checked />
              <span class="option-title">🦊 中級</span>
              <span class="option-desc">ほどよい歯ごたえ。</span>
            </label>
            <label class="option-card">
              <input type="radio" name="difficulty" value="advanced" />
              <span class="option-title">🐺 上級</span>
              <span class="option-desc">先を読んで攻めてくる。</span>
            </label>
            <label class="option-card">
              <input type="radio" name="difficulty" value="oni" />
              <span class="option-title">👹 鬼</span>
              <span class="option-desc">あなたの駒も推理してくる最強AI。</span>
            </label>
          </div>
        </fieldset>

        <div class="home-actions">
          <button type="submit" id="startGame" class="primary">対局開始</button>
          <button type="button" id="openHelpHome" class="ghost">遊び方</button>
        </div>
      </form>
    </section>

    <section id="screen-game" class="screen">
      <header class="game-bar">
        <img src="assets/logo.svg" alt="HIDDEN LINE" class="bar-logo" />
        <div class="bar-actions">
          <button id="openHelpGame" class="ghost" type="button">？ 遊び方</button>
          <button id="resign" class="ghost" type="button">投了</button>
          <button id="goHome" class="ghost" type="button">ホームへ</button>
        </div>
      </header>
      <p id="status" role="status">駒を選択してください。</p>
      <main id="app">
        <div class="board-wrap">
          <div class="board" id="board"></div>
          <div class="fx-layer" id="fx" aria-hidden="true"></div>
        </div>
        <aside id="side">
          <section>
            <h2>対局情報</h2>
            <p id="moveCount"></p>
          </section>
          <section>
            <h2>推理メモ</h2>
            <p class="hint">戦闘した相手の駒は、以後は正体が見えます。駒を右クリック（長押し）で戦闘履歴を確認できます。</p>
            <ol id="battleLog"></ol>
          </section>
        </aside>
      </main>
      <div id="handover" hidden>
        <div class="handover-card">
          <p id="handoverText">交代してください</p>
          <button id="handoverOk" type="button" class="primary">準備OK</button>
        </div>
      </div>
    </section>

    <dialog id="result-dialog">
      <h2 id="resultTitle"></h2>
      <p id="resultReason"></p>
      <div class="dialog-actions">
        <button id="rematch" type="button" class="primary">もう一度</button>
        <button id="resultHome" type="button" class="ghost">ホームへ</button>
      </div>
    </dialog>

    <dialog id="help-dialog">
      <div id="helpContent"></div>
      <div class="dialog-actions">
        <button id="closeHelp" type="button" class="primary">とじる</button>
      </div>
    </dialog>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
